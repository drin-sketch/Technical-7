<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Web Design</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        /* Header */
        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* Navigation */
        nav {
            background-color: #555;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
        }

        nav ul li {
            padding: 15px 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
        }

        /* Main Content */
        .container {
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        .main-content {
            flex: 3;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .sidebar {
            flex: 1;
            background-color: #ddd;
            padding: 20px;
        }

        /* Footer */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }

        /* Tablet View */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            nav ul {
                flex-wrap: wrap;
            }
        }

        /* Mobile View */
        @media (max-width: 480px) {
            nav ul {
                flex-direction: column;
                text-align: center;
            }

            nav ul li {
                border-bottom: 1px solid #777;
            }

            header {
                font-size: 18px;
            }

            .main-content,
            .sidebar {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>My Responsive Website</h1>
    </header>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="main-content">
            <h2>Main Content</h2>
            <p>
                This is the main content area. The layout is responsive and
                adjusts based on screen size.
            </p>
        </div>

        <div class="sidebar">
            <h3>Sidebar</h3>
            <p>Additional information goes here.</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 My Website. All Rights Reserved.</p>
    </footer>

</body>
</html>
